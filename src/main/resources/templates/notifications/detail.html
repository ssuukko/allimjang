<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${notice.title} + ' - 내 알림'">알림 상세 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('notifications')}"></div>
<div th:replace="~{fragments/layout :: memberPanel}"></div>

<main class="container c-main flex-grow-1">
    <section class="c-surface p-4 p-lg-5 c-fade-up">
        <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
            <h2 class="mb-0">알림 상세</h2>
            <a href="/notifications" class="btn c-btn c-btn-outline">내 알림 목록</a>
        </div>

        <article class="c-notice-detail">
            <header class="mb-3 pb-3 border-bottom">
                <h3 class="mb-2" th:text="${notice.title}">제목</h3>
                <div class="small text-muted">
                    <span th:text="${notice.authorName}">작성자</span>
                    <span class="mx-1">·</span>
                    <span th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-05 12:00</span>
                </div>
            </header>

            <div class="c-notice-content" th:text="${notice.content}">내용</div>
        </article>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
