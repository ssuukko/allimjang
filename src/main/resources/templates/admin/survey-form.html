<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문 작성 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100 c-admin-page">
<div th:replace="~{fragments/layout :: header('admin')}"></div>
<div th:replace="~{fragments/layout :: memberPanel}"></div>

<main class="container c-main c-admin-main flex-grow-1">
    <div class="row g-4 c-admin-layout">
        <div class="col-lg-3">
            <div th:replace="~{admin/fragments/nav :: sidebar('surveys')}"></div>
        </div>
        <div class="col-lg-9">
            <section class="c-surface c-admin-surface p-4 p-lg-5 c-fade-up">
                <div class="c-page-header">
                    <h2>설문 작성</h2>
                    <a href="/admin" class="btn c-btn c-btn-outline c-admin-ghost-btn">관리자 홈</a>
                </div>

                <div class="alert alert-success" th:if="${param.saved}">
                    설문 초안이 저장되었습니다.
                </div>
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">
                    설문 저장 중 오류가 발생했습니다.
                </div>

                <form method="post" action="/admin/surveys" id="surveyForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="card c-card">
                        <div class="card-body c-card__body">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="title" class="form-label c-form-label">설문 제목 <span class="text-danger">*</span></label>
                                    <input type="text" id="title" name="title" class="form-control c-input" required placeholder="예: 1학기 급식 만족도 조사">
                                </div>
                                <div class="col-12">
                                    <label for="description" class="form-label c-form-label">설문 설명</label>
                                    <textarea id="description" name="description" class="form-control c-textarea" rows="4"
                                              placeholder="설문 목적과 응답 안내 문구를 입력하세요."></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label c-form-label">시작일시</label>
                                    <input type="hidden" id="startAt" name="startAt">
                                    <div class="d-flex flex-wrap align-items-center gap-2 c-survey-datetime-row">
                                        <input type="text" id="startDate" class="form-control c-input c-survey-datetime-input c-survey-date-input" placeholder="YYYY-MM-DD">
                                        <input type="time" id="startTime" class="form-control c-input c-survey-datetime-input c-survey-time-input" step="60" value="09:00">
                                        <button type="button" id="startNowBtn" class="btn c-btn c-btn-outline btn-sm c-survey-datetime-btn">현재시간</button>
                                    </div>
                                    <div class="small text-muted mt-1">날짜와 시간을 선택하면 자동으로 시작일시에 반영됩니다.</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label c-form-label">마감일시</label>
                                    <input type="hidden" id="endAt" name="endAt">
                                    <div class="d-flex flex-wrap align-items-center gap-2 c-survey-datetime-row">
                                        <input type="text" id="endDate" class="form-control c-input c-survey-datetime-input c-survey-date-input" placeholder="YYYY-MM-DD">
                                        <input type="time" id="endTime" class="form-control c-input c-survey-datetime-input c-survey-time-input" step="60" value="18:00">
                                        <button type="button" id="endClearBtn" class="btn c-btn c-btn-outline btn-sm c-survey-datetime-btn">초기화</button>
                                    </div>
                                    <div class="d-flex flex-wrap gap-2 mt-2">
                                        <button type="button" class="btn btn-sm c-btn c-btn-outline end-preset-btn" data-minutes="30">+30분</button>
                                        <button type="button" class="btn btn-sm c-btn c-btn-outline end-preset-btn" data-minutes="60">+1시간</button>
                                        <button type="button" class="btn btn-sm c-btn c-btn-outline end-preset-btn" data-minutes="180">+3시간</button>
                                        <button type="button" class="btn btn-sm c-btn c-btn-outline end-preset-btn" data-minutes="1440">+1일</button>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 border rounded-4 p-3 p-lg-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h5 class="mb-0">질문 구성</h5>
                                    <button type="button" id="addQuestionBtn" class="btn c-btn c-btn-outline btn-sm">질문 추가</button>
                                </div>
                                <div id="questionList" class="d-flex flex-column gap-3"></div>
                                <div id="surveyBuilderError" class="alert alert-danger mt-3 d-none"></div>
                            </div>
                        </div>

                        <div class="card-footer bg-white border-0 pb-4">
                            <div class="d-flex justify-content-between">
                                <a href="/admin" class="btn c-btn c-btn-outline">취소</a>
                                <button type="submit" class="btn btn-primary c-btn c-btn-primary" data-loading-text="저장중...">설문 저장</button>
                            </div>
                        </div>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const list = document.getElementById('questionList');
        const addButton = document.getElementById('addQuestionBtn');
        const startInput = document.getElementById('startAt');
        const endInput = document.getElementById('endAt');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');
        const startNowBtn = document.getElementById('startNowBtn');
        const endClearBtn = document.getElementById('endClearBtn');
        const endPresetButtons = document.querySelectorAll('.end-preset-btn');
        let questionIndex = 0;

        flatpickr.localize(flatpickr.l10ns.ko);

        function normalizeTime(value) {
            if (!value) return '';
            const match = /^([01]\d|2[0-3]):([0-5]\d)$/.exec(String(value).trim());
            return match ? match[0] : '';
        }

        function normalizeDate(value) {
            if (!value) return '';
            const trimmed = String(value).trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return '';
            const parsed = new Date(trimmed + 'T00:00:00');
            if (Number.isNaN(parsed.getTime())) return '';
            const yyyy = parsed.getFullYear();
            const mm = String(parsed.getMonth() + 1).padStart(2, '0');
            const dd = String(parsed.getDate()).padStart(2, '0');
            return yyyy + '-' + mm + '-' + dd === trimmed ? trimmed : '';
        }

        function composeDateTime(dateValue, timeValue) {
            const normalizedDate = normalizeDate(dateValue);
            if (!normalizedDate) return '';
            return normalizedDate + 'T' + (normalizeTime(timeValue) || '00:00');
        }

        function syncStartHidden() {
            startInput.value = composeDateTime(startDateInput.value, startTimeInput.value);
            const normalizedDate = normalizeDate(startDateInput.value);
            if (normalizedDate) {
                endPicker.set('minDate', normalizedDate);
            } else {
                endPicker.set('minDate', null);
            }
        }

        function syncEndHidden() {
            endInput.value = composeDateTime(endDateInput.value, endTimeInput.value);
        }

        const startPicker = flatpickr(startDateInput, {
            enableTime: false,
            dateFormat: 'Y-m-d',
            allowInput: true,
            onChange: function (selectedDates, dateStr) {
                startDateInput.value = dateStr;
                syncStartHidden();
            }
        });

        const endPicker = flatpickr(endDateInput, {
            enableTime: false,
            dateFormat: 'Y-m-d',
            allowInput: true,
            onChange: function (selectedDates, dateStr) {
                endDateInput.value = dateStr;
                syncEndHidden();
            }
        });

        startDateInput.addEventListener('input', syncStartHidden);
        startDateInput.addEventListener('change', syncStartHidden);
        endDateInput.addEventListener('input', syncEndHidden);
        endDateInput.addEventListener('change', syncEndHidden);
        startTimeInput.addEventListener('input', syncStartHidden);
        startTimeInput.addEventListener('change', syncStartHidden);
        endTimeInput.addEventListener('input', syncEndHidden);
        endTimeInput.addEventListener('change', syncEndHidden);

        function floorToMinute(date, minuteStep) {
            const d = new Date(date);
            const minutes = d.getMinutes();
            d.setMinutes(minutes - (minutes % minuteStep), 0, 0);
            return d;
        }

        function setStartNow() {
            const now = floorToMinute(new Date(), 1);
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            startPicker.setDate(yyyy + '-' + mm + '-' + dd, true);
            startTimeInput.value = hh + ':' + mi;
            syncStartHidden();

            if (!endInput.value) {
                const oneHourLater = new Date(now.getTime() + 60 * 60 * 1000);
                const eyyyy = oneHourLater.getFullYear();
                const emm = String(oneHourLater.getMonth() + 1).padStart(2, '0');
                const edd = String(oneHourLater.getDate()).padStart(2, '0');
                const ehh = String(oneHourLater.getHours()).padStart(2, '0');
                const emi = String(oneHourLater.getMinutes()).padStart(2, '0');
                endPicker.setDate(eyyyy + '-' + emm + '-' + edd, true);
                endTimeInput.value = ehh + ':' + emi;
                syncEndHidden();
            }
        }

        function setEndFromPreset(minutesToAdd) {
            const base = startInput.value ? new Date(startInput.value) : floorToMinute(new Date(), 1);
            const endDate = new Date(base.getTime() + (minutesToAdd * 60 * 1000));
            const yyyy = endDate.getFullYear();
            const mm = String(endDate.getMonth() + 1).padStart(2, '0');
            const dd = String(endDate.getDate()).padStart(2, '0');
            const hh = String(endDate.getHours()).padStart(2, '0');
            const mi = String(endDate.getMinutes()).padStart(2, '0');
            endPicker.setDate(yyyy + '-' + mm + '-' + dd, true);
            endTimeInput.value = hh + ':' + mi;
            syncEndHidden();
        }

        if (startNowBtn) {
            startNowBtn.addEventListener('click', setStartNow);
        }
        if (endClearBtn) {
            endClearBtn.addEventListener('click', function () {
                endPicker.clear();
                endDateInput.value = '';
                endTimeInput.value = '18:00';
                endInput.value = '';
            });
        }
        endPresetButtons.forEach(btn => {
            btn.addEventListener('click', function () {
                const minutes = Number(btn.getAttribute('data-minutes') || '0');
                if (minutes > 0) {
                    setEndFromPreset(minutes);
                }
            });
        });

        function buildQuestionItem(index) {
            const wrap = document.createElement('div');
            wrap.className = 'border rounded-4 p-3 bg-white c-survey-question-item';
            wrap.innerHTML = ''
                + '<div class="d-flex justify-content-between align-items-center mb-2">'
                +   '<strong>질문 ' + (index + 1) + '</strong>'
                +   '<div class="d-flex gap-2">'
                +     '<button type="button" class="btn btn-sm c-btn c-btn-outline move-up-question-btn">위로</button>'
                +     '<button type="button" class="btn btn-sm c-btn c-btn-outline move-down-question-btn">아래로</button>'
                +     '<button type="button" class="btn btn-sm c-btn c-btn-outline duplicate-question-btn">복제</button>'
                +     '<button type="button" class="btn btn-sm btn-outline-danger remove-question-btn">삭제</button>'
                +   '</div>'
                + '</div>'
                + '<div class="mb-2">'
                +   '<label class="form-label c-form-label">질문 내용</label>'
                +   '<input type="text" class="form-control c-input" name="questionTitles" required placeholder="질문을 입력하세요">'
                + '</div>'
                + '<div class="mb-2">'
                +   '<label class="form-label c-form-label">질문 유형</label>'
                +   '<select class="form-select c-select" name="questionTypes">'
                +     '<option value="SINGLE">객관식 (단일 선택)</option>'
                +     '<option value="MULTIPLE">객관식 (복수 선택)</option>'
                +     '<option value="TEXT">주관식</option>'
                +   '</select>'
                + '</div>'
                + '<div class="option-builder-wrap">'
                +   '<label class="form-label c-form-label d-flex justify-content-between align-items-center mb-2">'
                +     '<span>선택지</span>'
                +     '<button type="button" class="btn btn-sm c-btn c-btn-outline add-option-btn">선택지 추가</button>'
                +   '</label>'
                +   '<div class="option-list d-flex flex-column gap-2 mb-2"></div>'
                +   '<div class="small text-muted">객관식일 때만 사용됩니다. 빈 선택지는 저장 시 제외됩니다.</div>'
                +   '<textarea class="d-none question-options-hidden" name="questionOptions"></textarea>'
                + '</div>';
            return wrap;
        }

        function syncHiddenOptions(questionItem) {
            const hidden = questionItem.querySelector('.question-options-hidden');
            const inputs = questionItem.querySelectorAll('.option-input');
            const lines = Array.from(inputs)
                .map(input => input.value.trim())
                .filter(Boolean);
            hidden.value = lines.join('\n');
        }

        function addOptionField(questionItem, value) {
            const list = questionItem.querySelector('.option-list');
            const row = document.createElement('div');
            row.className = 'd-flex gap-2 align-items-center';
            row.innerHTML = ''
                + '<input type="text" class="form-control c-input option-input" placeholder="선택지를 입력하세요">'
                + '<button type="button" class="btn btn-sm btn-outline-danger remove-option-btn">삭제</button>';
            const input = row.querySelector('.option-input');
            input.value = value || '';
            input.addEventListener('input', function () {
                syncHiddenOptions(questionItem);
            });
            row.querySelector('.remove-option-btn').addEventListener('click', function () {
                row.remove();
                syncHiddenOptions(questionItem);
            });
            list.appendChild(row);
            syncHiddenOptions(questionItem);
        }

        function toggleOptionBuilder(questionItem) {
            const typeSelect = questionItem.querySelector('select[name="questionTypes"]');
            const optionWrap = questionItem.querySelector('.option-builder-wrap');
            const isText = typeSelect.value === 'TEXT';
            optionWrap.classList.toggle('d-none', isText);
            if (isText) {
                questionItem.querySelector('.question-options-hidden').value = '';
            } else if (questionItem.querySelectorAll('.option-input').length === 0) {
                addOptionField(questionItem, '');
                addOptionField(questionItem, '');
            }
        }

        function wireQuestionItem(item) {
            const removeButton = item.querySelector('.remove-question-btn');
            const duplicateButton = item.querySelector('.duplicate-question-btn');
            const moveUpButton = item.querySelector('.move-up-question-btn');
            const moveDownButton = item.querySelector('.move-down-question-btn');
            const typeSelect = item.querySelector('select[name="questionTypes"]');
            const addOptionButton = item.querySelector('.add-option-btn');

            removeButton.addEventListener('click', function () {
                item.remove();
                reindex();
            });

            moveUpButton.addEventListener('click', function () {
                const prev = item.previousElementSibling;
                if (!prev) return;
                list.insertBefore(item, prev);
                reindex();
            });

            moveDownButton.addEventListener('click', function () {
                const next = item.nextElementSibling;
                if (!next) return;
                list.insertBefore(next, item);
                reindex();
            });

            duplicateButton.addEventListener('click', function () {
                const copy = buildQuestionItem(questionIndex++);
                copy.querySelector('input[name="questionTitles"]').value = item.querySelector('input[name="questionTitles"]').value;
                copy.querySelector('select[name="questionTypes"]').value = typeSelect.value;
                wireQuestionItem(copy);
                const values = Array.from(item.querySelectorAll('.option-input')).map(input => input.value);
                const copyList = copy.querySelector('.option-list');
                copyList.innerHTML = '';
                values.forEach(value => addOptionField(copy, value));
                toggleOptionBuilder(copy);
                list.appendChild(copy);
                reindex();
            });

            addOptionButton.addEventListener('click', function () {
                addOptionField(item, '');
            });
            typeSelect.addEventListener('change', function () {
                toggleOptionBuilder(item);
                syncHiddenOptions(item);
            });

            const optionList = item.querySelector('.option-list');
            optionList.innerHTML = '';
            addOptionField(item, '');
            addOptionField(item, '');
            toggleOptionBuilder(item);
        }

        function reindex() {
            const items = list.querySelectorAll('.border.rounded-4');
            items.forEach((item, idx) => {
                const title = item.querySelector('strong');
                if (title) title.textContent = '질문 ' + (idx + 1);
            });
        }

        function addQuestion() {
            const item = buildQuestionItem(questionIndex++);
            wireQuestionItem(item);
            list.appendChild(item);
            reindex();
        }

        function validateSurveyBuilder() {
            const errorBox = document.getElementById('surveyBuilderError');
            const questions = list.querySelectorAll('.c-survey-question-item');
            for (const question of questions) {
                const type = question.querySelector('select[name="questionTypes"]').value;
                if (type === 'TEXT') continue;
                const values = Array.from(question.querySelectorAll('.option-input'))
                    .map(input => input.value.trim())
                    .filter(Boolean);
                if (values.length < 2) {
                    errorBox.textContent = '객관식 문항은 최소 2개 이상의 선택지를 입력해 주세요.';
                    errorBox.classList.remove('d-none');
                    return false;
                }
            }
            errorBox.classList.add('d-none');
            errorBox.textContent = '';
            return true;
        }

        addButton.addEventListener('click', addQuestion);
        document.getElementById('surveyForm').addEventListener('submit', function (e) {
            const items = list.querySelectorAll('.c-survey-question-item');
            items.forEach(syncHiddenOptions);
            if (!validateSurveyBuilder()) {
                e.preventDefault();
            }
        });
        addQuestion();
    });
</script>
</body>
</html>
