<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${survey.title} + ' - 설문 응답'">설문 응답 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('dashboard')}"></div>
<div th:replace="~{fragments/layout :: memberPanel}"></div>

<main class="container c-main flex-grow-1">
    <section class="c-surface p-4 p-lg-5 c-fade-up">
        <div class="c-page-header">
            <h2 th:text="${survey.title}">설문 제목</h2>
            <a href="/surveys" class="btn c-btn c-btn-outline">목록</a>
        </div>

        <p class="c-muted mb-3" th:text="${survey.description} ?: '설문 설명이 없습니다.'">설문 설명</p>
        <div class="small text-muted mb-4">
            응답 수: <span th:text="${survey.responseCount}">0</span>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-success" th:if="${param.submitted}">
            설문 응답이 저장되었습니다.
        </div>
        <div class="alert alert-info" th:if="${survey.responded}">
            이미 응답한 설문입니다. 중복 제출은 불가합니다.
        </div>

        <form th:if="${!survey.responded}" method="post" th:action="@{/surveys/{id}/responses(id=${survey.id})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="d-flex flex-column gap-3">
                <div class="card c-card" th:each="q, st : ${survey.questions}">
                    <div class="card-body c-card__body">
                        <h5 class="mb-2">
                            <span th:text="${st.count} + '. '">1. </span>
                            <span th:text="${q.title}">질문</span>
                            <span class="text-danger" th:if="${q.isRequired}">*</span>
                        </h5>

                        <div th:if="${q.type == 'TEXT'}">
                            <textarea class="form-control c-textarea"
                                      th:name="${'q_' + q.id}"
                                      rows="4"
                                      th:attr="required=${q.isRequired}"></textarea>
                        </div>

                        <div th:if="${q.type == 'SINGLE'}" class="d-flex flex-column gap-2">
                            <div class="form-check" th:each="opt : ${q.options}">
                                <input class="form-check-input"
                                       type="radio"
                                       th:id="${'q_' + q.id + '_opt_' + opt.id}"
                                       th:name="${'q_' + q.id}"
                                       th:value="${opt.id}"
                                       th:attr="required=${q.isRequired}">
                                <label class="form-check-label" th:for="${'q_' + q.id + '_opt_' + opt.id}" th:text="${opt.optionLabel}">
                                    선택지
                                </label>
                            </div>
                        </div>

                        <div th:if="${q.type == 'MULTIPLE'}" class="d-flex flex-column gap-2">
                            <div class="form-check" th:each="opt : ${q.options}">
                                <input class="form-check-input"
                                       type="checkbox"
                                       th:id="${'q_' + q.id + '_opt_' + opt.id}"
                                       th:name="${'q_' + q.id}"
                                       th:value="${opt.id}">
                                <label class="form-check-label" th:for="${'q_' + q.id + '_opt_' + opt.id}" th:text="${opt.optionLabel}">
                                    선택지
                                </label>
                            </div>
                            <div class="small text-danger" th:if="${q.isRequired}">필수 문항입니다. 최소 1개 이상 선택하세요.</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex justify-content-between">
                <a href="/surveys" class="btn c-btn c-btn-outline">취소</a>
                <button type="submit" class="btn btn-primary c-btn c-btn-primary" data-loading-text="제출중...">응답 제출</button>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
