<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문 목록 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('dashboard')}"></div>
<div th:replace="~{fragments/layout :: memberPanel}"></div>

<main class="container c-main flex-grow-1">
    <section class="c-surface p-4 p-lg-5 c-fade-up">
        <div class="c-page-header">
            <h2>설문 목록</h2>
            <a href="/dashboard" class="btn c-btn c-btn-outline">대시보드</a>
        </div>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-success" th:if="${param.submitted}">
            설문 응답이 저장되었습니다.
        </div>

        <div class="d-flex flex-column gap-3" th:if="${!#lists.isEmpty(surveys)}">
            <article class="card c-card" th:each="survey : ${surveys}">
                <div class="card-body c-card__body">
                    <div class="d-flex justify-content-between align-items-start gap-3">
                        <div>
                            <h5 class="mb-2" th:text="${survey.title}">설문 제목</h5>
                            <p class="c-muted mb-2" th:text="${survey.description} ?: '설문 설명이 없습니다.'">설문 설명</p>
                            <div class="small text-muted mb-1">
                                기간:
                                <span th:text="${survey.startAt} ?: '즉시 시작'">시작</span>
                                ~
                                <span th:text="${survey.endAt} ?: '마감 없음'">마감</span>
                            </div>
                            <div class="small text-muted">
                                응답 수: <span th:text="${survey.responseCount}">0</span>
                            </div>
                        </div>
                        <div class="text-end">
                            <span class="badge text-bg-success mb-2" th:if="${survey.responded}">응답 완료</span>
                            <div>
                                <a th:href="@{/surveys/{id}(id=${survey.id})}"
                                   class="btn c-btn c-btn-primary btn-sm"
                                   th:text="${survey.responded} ? '응답 보기' : '응답하기'">응답하기</a>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </div>

        <div class="c-muted" th:if="${#lists.isEmpty(surveys)}">
            현재 참여 가능한 설문이 없습니다.
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
