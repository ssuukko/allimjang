<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${notice.title} + ' - 알림장'">공지사항 상세 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('notices')}"></div>

<main class="container c-main mb-5 flex-grow-1">
    <div class="c-page-header c-fade-up">
        <a href="/notices" class="btn c-btn c-btn-outline">목록으로</a>
        <div class="d-flex gap-2 flex-wrap justify-content-end">
            <a th:if="${canEdit}" th:href="@{/notices/{id}/edit(id=${notice.id})}" class="btn btn-warning c-btn">수정</a>

            <form th:if="${canHide and !notice.getIsHidden()}" th:action="@{/notices/{id}/hide(id=${notice.id})}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-secondary c-btn"
                        onclick="return confirm('이 게시물을 숨김 처리하시겠습니까?')">숨김</button>
            </form>

            <form th:if="${canUnhide and notice.getIsHidden()}" th:action="@{/notices/{id}/unhide(id=${notice.id})}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn c-btn c-btn-outline"
                        onclick="return confirm('이 게시물을 숨김 해제하시겠습니까?')">해제</button>
            </form>

            <form th:if="${canDelete}" th:action="@{/notices/{id}/delete(id=${notice.id})}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-danger c-btn"
                        onclick="return confirm('정말로 이 공지사항을 삭제하시겠습니까?')">삭제</button>
            </form>
        </div>
    </div>

    <article class="card c-card c-fade-up">
        <div class="c-notice-header">
            <div class="mb-2">
                <span th:if="${notice.isImportant}" class="c-badge-on-dark">중요</span>
                <span th:if="${notice.getIsHidden()}" class="badge bg-secondary ms-2">숨김</span>
            </div>
            <h2 class="mb-0" th:text="${notice.title}">공지사항 제목</h2>
        </div>

        <div class="card-body c-card__body">
            <div class="c-meta-panel mb-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <small class="c-muted">작성자</small>
                        <div><strong th:text="${notice.authorName}">관리자</strong></div>
                    </div>
                    <div class="col-md-4">
                        <small class="c-muted">작성일</small>
                        <div><strong th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</strong></div>
                    </div>
                    <div class="col-md-4">
                        <small class="c-muted">조회수</small>
                        <div><strong><span th:text="${notice.viewCount}">0</span>회</strong></div>
                    </div>
                </div>
                <div th:if="${notice.updatedAt != null}" class="mt-2">
                    <small class="c-muted">
                        최종 수정: <span th:text="${#temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 13:00</span>
                    </small>
                </div>
            </div>

            <div class="c-notice-content" th:text="${notice.content}">
                공지사항 내용이 여기에 표시됩니다.
            </div>
        </div>

        <div class="card-footer bg-white border-0 pb-4">
            <a href="/notices" class="btn c-btn c-btn-outline">목록으로</a>
        </div>
    </article>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
