<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{fragments/vendor :: flatpickrStyles}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('notices')}"></div>

<main class="container c-main flex-grow-1">
    <section class="c-surface p-4 p-lg-5 c-fade-up">
        <div class="c-page-header">
            <h2>공지사항</h2>
            <a href="/notices/new" class="btn btn-primary c-btn c-btn-primary">새 공지 작성</a>
        </div>

        <div th:replace="~{fragments/search :: searchForm('/notices', ${keyword}, ${searchType}, ${pageSize}, '검색어를 입력하세요')}"></div>

        <div class="card c-card mt-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 c-table">
                        <thead>
                        <tr>
                            <th style="width: 60%">제목</th>
                            <th style="width: 15%">작성자</th>
                            <th style="width: 15%">작성일</th>
                            <th style="width: 10%" class="text-center">조회</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(notices)}">
                            <td colspan="4" class="text-center c-muted py-5">
                                등록된 공지사항이 없습니다.
                            </td>
                        </tr>

                        <tr th:each="notice : ${notices}"
                            th:classappend="${notice.isImportant} ? ' c-notice-row--important' : ''"
                            class="c-notice-row">
                            <td>
                                <a th:href="@{/notices/{id}(id=${notice.id})}" class="text-decoration-none text-dark">
                                    <span th:if="${notice.isImportant}" class="c-badge-important me-2">중요</span>
                                    <span th:if="${isAdmin and notice.getIsHidden()}" class="badge bg-secondary me-2">숨김</span>
                                    <strong th:text="${notice.title}">공지사항 제목</strong>
                                </a>
                            </td>
                            <td th:text="${notice.authorName}">작성자</td>
                            <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                            <td class="text-center">
                                <span class="badge text-bg-light border" th:text="${notice.viewCount}">0</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-3 c-muted small">
            총 <strong th:text="${totalCount}">0</strong>개의 공지사항
        </div>

        <div th:replace="~{fragments/pagination :: pager('/notices', ${currentPage}, ${totalPages}, ${pageSize}, ${keyword}, ${searchType})}"></div>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments/vendor :: flatpickrScripts}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const noticeRows = document.querySelectorAll('.c-notice-row');
        noticeRows.forEach(row => {
            row.addEventListener('click', function(e) {
                if (e.target.closest('a')) return;
                const link = this.querySelector('a');
                if (link) {
                    window.location.href = link.href;
                }
            });
        });
    });
</script>
</body>
</html>
