<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅 목록 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('chat')}"></div>
<div th:replace="~{fragments/layout :: memberPanel}"></div>

<main class="container c-main flex-grow-1">
    <section class="c-surface p-4 p-lg-5 c-fade-up">
        <div class="c-page-header">
            <h2>채팅 목록</h2>
            <div class="d-flex gap-2">
                <button type="button" id="openCreateRoomBtn" class="btn c-btn c-btn-outline">방 만들기</button>
                <a href="/dashboard" class="btn c-btn c-btn-outline">대시보드</a>
            </div>
        </div>
        <p class="c-muted mb-3">최근 대화한 채팅방을 선택해 입장하세요.</p>

        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
            <input id="chatRoomSearch" class="form-control c-input c-chat-room-search" placeholder="이름 또는 roomId 검색">
            <div class="btn-group" role="group" aria-label="정렬">
                <button type="button" id="sortRecentBtn" class="btn c-btn c-btn-outline btn-sm">최근순</button>
                <button type="button" id="sortPinnedBtn" class="btn c-btn c-btn-outline btn-sm">고정 우선</button>
            </div>
        </div>

        <div id="chatRoomList" class="d-flex flex-column gap-2">
            <div class="text-muted small">불러오는 중...</div>
        </div>
    </section>
</main>

<div class="modal fade" id="createRoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">단체 채팅방 만들기</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="groupRoomName" class="form-label c-form-label mb-1">방 이름</label>
                    <input id="groupRoomName" class="form-control c-input" maxlength="120" placeholder="예: 2학년 운영회의">
                </div>
                <div class="mb-2 d-flex justify-content-between align-items-center">
                    <label class="form-label c-form-label mb-0">초대할 회원</label>
                    <small id="groupMemberCountText" class="text-muted">0명 선택</small>
                </div>
                <div id="groupMemberList" class="c-group-member-list">
                    <div class="small text-muted">불러오는 중...</div>
                </div>
                <div class="small text-muted mt-2">단체 채팅은 본인 포함 최소 3명이어야 생성됩니다.</div>
                <div id="groupCreateError" class="alert alert-danger mt-2 d-none py-2 px-3"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn c-btn c-btn-outline" data-bs-dismiss="modal">취소</button>
                <button type="button" id="createGroupRoomSubmitBtn" class="btn btn-primary c-btn c-btn-primary">생성</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const list = document.getElementById('chatRoomList');
        const searchInput = document.getElementById('chatRoomSearch');
        const sortRecentBtn = document.getElementById('sortRecentBtn');
        const sortPinnedBtn = document.getElementById('sortPinnedBtn');
        const openCreateRoomBtn = document.getElementById('openCreateRoomBtn');
        const createRoomModalEl = document.getElementById('createRoomModal');
        const groupRoomNameInput = document.getElementById('groupRoomName');
        const groupMemberList = document.getElementById('groupMemberList');
        const groupMemberCountText = document.getElementById('groupMemberCountText');
        const createGroupRoomSubmitBtn = document.getElementById('createGroupRoomSubmitBtn');
        const groupCreateError = document.getElementById('groupCreateError');

        if (!list || !searchInput || !sortRecentBtn || !sortPinnedBtn || !openCreateRoomBtn || !createRoomModalEl
            || !groupRoomNameInput || !groupMemberList || !groupMemberCountText || !createGroupRoomSubmitBtn || !groupCreateError) return;

        const PIN_KEY = 'chatPinnedRooms';
        let allRooms = [];
        let sortMode = 'recent';
        let pinnedRooms = new Set();
        let memberOptions = [];
        const createRoomModal = new bootstrap.Modal(createRoomModalEl);

        try {
            const saved = JSON.parse(localStorage.getItem(PIN_KEY) || '[]');
            if (Array.isArray(saved)) {
                pinnedRooms = new Set(saved.map(String));
            }
        } catch (e) {
            pinnedRooms = new Set();
        }

        const escapeHtml = function (value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        };

        const formatDateTime = function (value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleString();
        };

        const openRoom = function (room) {
            if (!room || !room.roomId) return;
            const params = new URLSearchParams();
            params.set('room', room.roomId);
            if (room.direct && room.partnerUsername) {
                params.set('partner', room.partnerUsername);
            }
            window.location.href = '/chat/room?' + params.toString();
        };

        const persistPinned = function () {
            localStorage.setItem(PIN_KEY, JSON.stringify(Array.from(pinnedRooms)));
        };

        const showGroupCreateError = function (message) {
            groupCreateError.textContent = message;
            groupCreateError.classList.remove('d-none');
        };

        const hideGroupCreateError = function () {
            groupCreateError.textContent = '';
            groupCreateError.classList.add('d-none');
        };

        const selectedMemberUsernames = function () {
            return Array.from(groupMemberList.querySelectorAll('input[type="checkbox"]:checked'))
                .map(el => el.value);
        };

        const refreshSelectedCount = function () {
            groupMemberCountText.textContent = selectedMemberUsernames().length + '명 선택';
        };

        const renderMemberOptions = function () {
            if (!memberOptions.length) {
                groupMemberList.innerHTML = '<div class="small text-muted">선택 가능한 회원이 없습니다.</div>';
                refreshSelectedCount();
                return;
            }
            groupMemberList.innerHTML = memberOptions.map(function (m) {
                const status = m.online ? '활동중' : '비활동중';
                return ''
                    + '<label class="c-group-member-item">'
                    +   '<input type="checkbox" value="' + escapeHtml(m.username) + '">'
                    +   '<span class="ms-2">' + escapeHtml(m.name) + ' (@' + escapeHtml(m.username) + ')</span>'
                    +   '<span class="ms-auto small text-muted">' + status + '</span>'
                    + '</label>';
            }).join('');
            groupMemberList.querySelectorAll('input[type="checkbox"]').forEach(function (el) {
                el.addEventListener('change', refreshSelectedCount);
            });
            refreshSelectedCount();
        };

        const loadMembersForGroupCreate = function () {
            groupMemberList.innerHTML = '<div class="small text-muted">불러오는 중...</div>';
            return fetch('/api/chat/members')
                .then(function (res) {
                    if (!res.ok) throw new Error('failed');
                    return res.json();
                })
                .then(function (members) {
                    memberOptions = Array.isArray(members)
                        ? members.filter(function (m) { return !m.me; })
                        : [];
                    renderMemberOptions();
                })
                .catch(function () {
                    memberOptions = [];
                    groupMemberList.innerHTML = '<div class="small text-danger">회원 목록을 불러오지 못했습니다.</div>';
                    refreshSelectedCount();
                });
        };

        const getSortableTime = function (room) {
            const t = room && room.lastMessageAt ? new Date(room.lastMessageAt).getTime() : 0;
            return Number.isNaN(t) ? 0 : t;
        };

        const render = function () {
            const keyword = searchInput.value.trim().toLowerCase();
            let rows = allRooms.slice();

            if (keyword) {
                rows = rows.filter(room => {
                    const title = String(room.roomTitle || '').toLowerCase();
                    const roomId = String(room.roomId || '').toLowerCase();
                    const partnerName = String(room.partnerName || '').toLowerCase();
                    const partnerUsername = String(room.partnerUsername || '').toLowerCase();
                    return title.includes(keyword)
                        || roomId.includes(keyword)
                        || partnerName.includes(keyword)
                        || partnerUsername.includes(keyword);
                });
            }

            rows.sort((a, b) => {
                const timeDiff = getSortableTime(b) - getSortableTime(a);
                if (sortMode === 'pinned') {
                    const ap = pinnedRooms.has(a.roomId) ? 1 : 0;
                    const bp = pinnedRooms.has(b.roomId) ? 1 : 0;
                    if (ap !== bp) return bp - ap;
                }
                return timeDiff;
            });

            if (rows.length === 0) {
                list.innerHTML = '<div class="text-muted small">조건에 맞는 채팅방이 없습니다.</div>';
                return;
            }

            list.innerHTML = rows.map(room => {
                const title = escapeHtml(room.roomTitle || room.roomId);
                const lastMessage = escapeHtml(room.lastMessage || '(메시지 없음)');
                const sender = escapeHtml(room.lastSenderName || '-');
                const at = escapeHtml(formatDateTime(room.lastMessageAt));
                const unread = Number(room.unreadCount || 0);
                const unreadBadge = unread > 0 ? '<span class="badge text-bg-warning c-chat-unread-badge">안읽음 ' + unread + '</span>' : '';
                const pinned = pinnedRooms.has(room.roomId);
                const pinText = pinned ? '★' : '☆';
                const pinClass = pinned ? 'is-pinned' : '';
                return ''
                    + '<div class="c-chat-room-item" data-room-id="' + escapeHtml(room.roomId) + '">'
                    +   '<button type="button" class="btn text-start c-chat-room-open">'
                    +   '<div class="d-flex justify-content-between align-items-start gap-2">'
                    +     '<div class="pe-5 w-100">'
                    +       '<div class="fw-semibold">' + title + '</div>'
                    +       '<div class="small text-muted mt-1">' + sender + ': ' + lastMessage + '</div>'
                    +       '<div class="small text-muted mt-1 d-flex align-items-center gap-2">'
                    +         '<span>' + at + '</span>'
                    +         unreadBadge
                    +       '</div>'
                    +     '</div>'
                    +   '</div>'
                    +   '</button>'
                    +   '<button type="button" class="btn btn-sm c-chat-pin-btn c-chat-pin-btn--inside ' + pinClass + '" data-pin-room-id="' + escapeHtml(room.roomId) + '" title="고정">' + pinText + '</button>'
                    + '</div>';
            }).join('');

            const roomMap = new Map(rows.map(r => [r.roomId, r]));
            list.querySelectorAll('.c-chat-room-item .c-chat-room-open').forEach(btn => {
                btn.addEventListener('click', function () {
                    const card = btn.closest('.c-chat-room-item');
                    if (!card) return;
                    openRoom(roomMap.get(card.getAttribute('data-room-id')));
                });
            });
            list.querySelectorAll('.c-chat-pin-btn').forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const roomId = btn.getAttribute('data-pin-room-id');
                    if (!roomId) return;
                    if (pinnedRooms.has(roomId)) {
                        pinnedRooms.delete(roomId);
                    } else {
                        pinnedRooms.add(roomId);
                    }
                    persistPinned();
                    render();
                });
            });

            sortRecentBtn.classList.toggle('active', sortMode === 'recent');
            sortPinnedBtn.classList.toggle('active', sortMode === 'pinned');
        };

        fetch('/api/chat/rooms')
            .then(res => {
                if (!res.ok) throw new Error('failed');
                return res.json();
            })
            .then(rooms => {
                if (!Array.isArray(rooms) || rooms.length === 0) {
                    list.innerHTML = '<div class="text-muted small">아직 대화한 채팅방이 없습니다. 회원 목록에서 채팅을 시작해 주세요.</div>';
                    return;
                }
                allRooms = rooms.slice();
                render();
            })
            .catch(() => {
                list.innerHTML = '<div class="text-danger small">채팅 목록을 불러오지 못했습니다.</div>';
            });

        openCreateRoomBtn.addEventListener('click', function () {
            hideGroupCreateError();
            groupRoomNameInput.value = '';
            loadMembersForGroupCreate();
            createRoomModal.show();
        });

        createGroupRoomSubmitBtn.addEventListener('click', function () {
            hideGroupCreateError();
            const selected = selectedMemberUsernames();
            if (selected.length < 2) {
                showGroupCreateError('최소 2명 이상 선택해 주세요. (본인 포함 3명)');
                return;
            }
            fetch('/api/chat/group-rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    roomName: groupRoomNameInput.value.trim(),
                    memberUsernames: selected
                })
            })
                .then(function (res) {
                    if (!res.ok) {
                        return res.text().then(function (text) {
                            throw new Error(text || '채팅방 생성에 실패했습니다.');
                        });
                    }
                    return res.json();
                })
                .then(function (data) {
                    createRoomModal.hide();
                    if (data && data.roomId) {
                        window.location.href = '/chat/room?room=' + encodeURIComponent(data.roomId);
                    } else {
                        window.location.reload();
                    }
                })
                .catch(function (err) {
                    showGroupCreateError(err.message || '채팅방 생성에 실패했습니다.');
                });
        });

        searchInput.addEventListener('input', render);
        sortRecentBtn.addEventListener('click', function () {
            sortMode = 'recent';
            render();
        });
        sortPinnedBtn.addEventListener('click', function () {
            sortMode = 'pinned';
            render();
        });
    })();
</script>
</body>
</html>
