<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅 - 알림장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/layout :: header('chat')}"></div>
<div th:replace="~{fragments/layout :: memberPanel}"></div>

<main class="container c-main flex-grow-1">
    <section class="c-surface c-chat-shell p-3 p-lg-4">
        <div class="c-chat-grid">
            <aside class="c-chat-side">
                <div class="c-chat-side-card">
                    <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                        <h2 id="chatTitle" class="c-chat-title mb-0">채팅</h2>
                        <span id="roomBadge" class="c-pill-brand">Room: general</span>
                    </div>
                    <div class="small text-muted mb-3">채팅방 이동 및 개인 할 일 지정</div>

                    <div class="mb-2 c-chat-room-picker">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="roomSelect" class="form-label c-form-label mb-0">접근 가능한 방</label>
                            <small id="roomCountText" class="text-muted">0개</small>
                        </div>
                        <select id="roomSelect" class="form-select c-select c-chat-room-select"></select>
                    </div>
                    <button id="joinRoomBtn" class="btn c-btn c-btn-outline w-100 c-chat-room-join">선택 방 입장</button>
                </div>

                <section id="taskPanel" class="c-chat-side-card c-task-panel d-none mt-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0">개인 할 일</h5>
                        <small class="text-muted">실시간 D-day</small>
                    </div>

                    <div id="taskError" class="alert alert-danger py-2 px-3 d-none" role="alert"></div>

                    <form id="taskForm" class="row g-2 align-items-end mb-3">
                        <div class="col-12">
                            <label for="taskTitle" class="form-label mb-1">할 일</label>
                            <input id="taskTitle" class="form-control c-input" maxlength="120" placeholder="예: 보고서 1차안 공유" required>
                        </div>
                        <div class="col-12">
                            <label for="taskDeadline" class="form-label mb-1">마감일시</label>
                            <input id="taskDeadline" type="datetime-local" class="form-control c-input" required>
                        </div>
                        <div class="col-12">
                            <label for="taskAssignee" class="form-label mb-1">담당자</label>
                            <input id="taskAssignee" class="form-control c-input" readonly>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-primary c-btn c-btn-primary">할 일 지정</button>
                        </div>
                    </form>

                    <div id="taskList" class="d-flex flex-column gap-2"></div>
                </section>
            </aside>

            <article class="c-chat-main">
                <div class="c-chat-main-head">
                    <div class="small text-muted">대화</div>
                    <span id="unreadBadge" class="badge text-bg-warning">안읽음 0</span>
                </div>

                <div id="chatBox" class="c-chat-stream"></div>

                <div class="c-chat-compose">
                    <input id="msgInput" class="form-control c-input" placeholder="메시지를 입력하세요">
                    <button id="sendBtn" class="btn btn-primary c-btn c-btn-primary">전송</button>
                </div>
            </article>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    let roomId = (params.get("room") || "general").trim();
    let partner = params.get("partner");

    const chatTitle = document.getElementById("chatTitle");
    const roomBadge = document.getElementById("roomBadge");
    const roomSelect = document.getElementById("roomSelect");
    const roomCountText = document.getElementById("roomCountText");
    const joinRoomBtn = document.getElementById("joinRoomBtn");
    const chatBox = document.getElementById("chatBox");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const unreadBadge = document.getElementById("unreadBadge");

    const taskPanel = document.getElementById("taskPanel");
    const taskForm = document.getElementById("taskForm");
    const taskTitleInput = document.getElementById("taskTitle");
    const taskDeadlineInput = document.getElementById("taskDeadline");
    const taskAssigneeInput = document.getElementById("taskAssignee");
    const taskError = document.getElementById("taskError");
    const taskList = document.getElementById("taskList");

    let stompClient = null;
    let subscription = null;

    let taskItems = [];
    let taskDetailCollapsed = {};
    let countdownTimer = null;
    let taskRefreshTimer = null;
    let readStatusTimer = null;
    let serverOffsetMs = 0;
    let currentUsername = "";
    let currentUserId = "";
    let accessibleRooms = [];
    let partnerLastReadAtMs = null;

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function isDirectRoom() {
        return roomId.startsWith("dm__");
    }

    function normalizeDateTimeLocal(date) {
        const d = new Date(date.getTime() - (date.getTimezoneOffset() * 60000));
        return d.toISOString().slice(0, 16);
    }

    function applyRoomLabel() {
        if (partner) {
            chatTitle.textContent = "채팅 - @" + partner;
        } else if (isDirectRoom()) {
            chatTitle.textContent = "1:1 채팅";
        } else {
            chatTitle.textContent = "채팅";
        }
        roomBadge.textContent = "Room: " + roomId;
        renderRoomSelect();

        const dm = isDirectRoom();
        taskPanel.classList.toggle("d-none", !dm);
        if (dm) {
            taskAssigneeInput.value = partner || '';
            if (!taskDeadlineInput.value) {
                const nextHour = new Date(Date.now() + (60 * 60 * 1000));
                taskDeadlineInput.value = normalizeDateTimeLocal(nextHour);
            }
        }
    }

    function resolvePartnerIfNeeded() {
        if (!isDirectRoom() || partner) {
            return Promise.resolve();
        }
        return fetch('/api/chat/rooms/' + encodeURIComponent(roomId) + '/partner')
            .then(res => {
                if (!res.ok) throw new Error('failed');
                return res.json();
            })
            .then(data => {
                if (data && data.targetUsername) {
                    partner = data.targetUsername;
                    const url = new URL(window.location.href);
                    url.searchParams.set("partner", partner);
                    window.history.replaceState({}, "", url);
                }
            })
            .catch(() => {});
    }

    function currentRoomTitle() {
        if (isDirectRoom()) {
            return partner ? ("1:1 - @" + partner) : "1:1 채팅";
        }
        return roomId;
    }

    function ensureCurrentRoomOption() {
        if (!roomId) return;
        const exists = accessibleRooms.some(r => r.roomId === roomId);
        if (exists) return;
        accessibleRooms.unshift({
            roomId: roomId,
            roomTitle: currentRoomTitle()
        });
    }

    function renderRoomSelect() {
        if (!roomSelect) return;
        ensureCurrentRoomOption();
        roomSelect.innerHTML = '';
        if (!accessibleRooms.length) {
            const empty = document.createElement('option');
            empty.value = '';
            empty.textContent = '접근 가능한 방이 없습니다';
            roomSelect.appendChild(empty);
            roomSelect.disabled = true;
            if (roomCountText) roomCountText.textContent = '0개';
            return;
        }
        roomSelect.disabled = false;
        if (roomCountText) roomCountText.textContent = accessibleRooms.length + '개';
        accessibleRooms.forEach(function (room) {
            const option = document.createElement('option');
            option.value = room.roomId;
            option.textContent = room.roomTitle || room.roomId;
            roomSelect.appendChild(option);
        });
        syncRoomSelectValue();
    }

    function syncRoomSelectValue() {
        if (!roomSelect || !roomId || roomSelect.disabled) return;
        const hasOption = Array.from(roomSelect.options).some(function (opt) {
            return opt.value === roomId;
        });
        if (!hasOption) {
            const option = document.createElement('option');
            option.value = roomId;
            option.textContent = currentRoomTitle();
            roomSelect.insertBefore(option, roomSelect.firstChild);
        }
        roomSelect.value = roomId;
    }

    function loadAccessibleRooms() {
        return fetch('/api/chat/rooms')
            .then(function (res) {
                if (!res.ok) throw new Error('failed');
                return res.json();
            })
            .then(function (rooms) {
                accessibleRooms = Array.isArray(rooms)
                    ? rooms.map(function (r) {
                        return {
                            roomId: r.roomId,
                            roomTitle: r.roomTitle || r.roomId
                        };
                    })
                    : [];
                renderRoomSelect();
            })
            .catch(function () {
                accessibleRooms = [];
                renderRoomSelect();
            });
    }

    function applyUnreadBadge(count) {
        unreadBadge.textContent = "안읽음 " + count;
        unreadBadge.classList.toggle("d-none", count === 0);
    }

    function appendMessage(m) {
        const item = document.createElement("div");
        const mine = currentUserId && m && m.senderId === currentUserId;
        item.className = "c-chat-msg" + (mine ? " c-chat-msg--mine" : "");
        item.setAttribute("data-created-at", m && m.createdAt ? m.createdAt : "");
        item.innerHTML = "" +
            "<div class=\"c-chat-msg__head\">" +
            "<strong class=\"c-chat-msg__sender\">" + escapeHtml(m.senderName) + "</strong>" +
            "<span class=\"c-chat-msg__time\">" + escapeHtml(formatDateTime(m.createdAt)) + "</span>" +
            "</div>" +
            "<div class=\"c-chat-msg__body\">" + escapeHtml(m.content) + "</div>" +
            (mine ? "<div class=\"c-chat-msg__read\">1</div>" : "");
        chatBox.appendChild(item);
        updateReadMarks();
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function loadMyIdentity() {
        return fetch('/api/chat/me')
            .then(function (res) {
                if (!res.ok) throw new Error('failed');
                return res.json();
            })
            .then(function (me) {
                currentUserId = (me && me.id) ? String(me.id) : "";
                currentUsername = (me && me.username) ? String(me.username) : currentUsername;
            })
            .catch(function () {
                currentUserId = "";
            });
    }

    function loadHistory() {
        chatBox.innerHTML = "";
        fetch("/api/chat/rooms/" + encodeURIComponent(roomId) + "/messages")
            .then(res => res.json())
            .then(list => {
                if (!Array.isArray(list) || list.length === 0) {
                    chatBox.innerHTML = '<div class="c-chat-empty">아직 메시지가 없습니다.</div>';
                    return;
                }
                list.forEach(appendMessage);
                refreshReadStatus();
            })
            .catch(() => {
                chatBox.innerHTML = '<div class="c-chat-empty c-chat-empty--error">메시지 불러오기에 실패했습니다.</div>';
            });
    }

    function subscribeRoom() {
        if (!stompClient || !stompClient.connected) return;
        if (subscription) {
            subscription.unsubscribe();
        }
        subscription = stompClient.subscribe("/topic/chat." + roomId, function (frame) {
            const existedEmpty = chatBox.querySelector('.c-chat-empty');
            if (existedEmpty) {
                chatBox.innerHTML = '';
            }
            appendMessage(JSON.parse(frame.body));
            refreshUnreadCount();
            refreshReadStatus();
        });
    }

    function connectSocket() {
        const socket = new SockJS("/ws-chat");
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function () {
            subscribeRoom();
        });
    }

    function moveRoom(nextRoomId) {
        const cleaned = (nextRoomId || "").trim();
        if (!cleaned) return;
        roomId = cleaned;
        taskDetailCollapsed = {};

        const url = new URL(window.location.href);
        url.searchParams.set("room", roomId);
        url.searchParams.delete("partner");
        window.history.replaceState({}, "", url);
        partner = null;

        stopTaskTimers();
        resolvePartnerIfNeeded().finally(function () {
            loadAccessibleRooms();
            applyRoomLabel();
            loadHistory();
            subscribeRoom();
            markAsRead();
            refreshUnreadCount();
            refreshTasks();
        });
    }

    function sendMessage() {
        const content = msgInput.value.trim();
        if (!content || !stompClient || !stompClient.connected) return;

        stompClient.send("/app/chat/send", {}, JSON.stringify({
            roomId: roomId,
            content: content
        }));
        msgInput.value = "";
        msgInput.focus();
    }

    function refreshUnreadCount() {
        fetch("/api/chat/rooms/" + encodeURIComponent(roomId) + "/unread-count")
            .then(res => res.json())
            .then(data => applyUnreadBadge(data.count || 0))
            .catch(() => applyUnreadBadge(0));
    }

    function markAsRead() {
        fetch("/api/chat/rooms/" + encodeURIComponent(roomId) + "/read", { method: "POST" })
            .then(() => {
                applyUnreadBadge(0);
                refreshReadStatus();
            })
            .catch(() => {});
    }

    function updateReadMarks() {
        if (!chatBox) return;
        chatBox.querySelectorAll('.c-chat-msg--mine').forEach(function (msg) {
            const readEl = msg.querySelector('.c-chat-msg__read');
            if (!readEl) return;
            if (partnerLastReadAtMs == null) {
                readEl.textContent = '1';
                return;
            }
            const createdAt = new Date(msg.getAttribute('data-created-at')).getTime();
            if (Number.isNaN(createdAt)) {
                readEl.textContent = '';
                return;
            }
            readEl.textContent = createdAt > partnerLastReadAtMs ? '1' : '';
        });
    }

    function refreshReadStatus() {
        if (!isDirectRoom()) {
            partnerLastReadAtMs = null;
            updateReadMarks();
            return;
        }
        fetch('/api/chat/rooms/' + encodeURIComponent(roomId) + '/read-status')
            .then(function (res) {
                if (!res.ok) throw new Error('failed');
                return res.json();
            })
            .then(function (data) {
                const value = data && data.partnerLastReadAt ? new Date(data.partnerLastReadAt).getTime() : null;
                partnerLastReadAtMs = Number.isNaN(value) ? null : value;
                updateReadMarks();
            })
            .catch(function () {
                partnerLastReadAtMs = null;
                updateReadMarks();
            });
    }

    function showTaskError(message) {
        if (!taskError) return;
        taskError.textContent = message;
        taskError.classList.remove("d-none");
    }

    function hideTaskError() {
        if (!taskError) return;
        taskError.textContent = "";
        taskError.classList.add("d-none");
    }

    function formatDateTime(value) {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) {
            return value || "";
        }
        return d.toLocaleString();
    }

    function calcDday(deadline, now) {
        const oneDay = 24 * 60 * 60 * 1000;
        const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        const deadlineDate = new Date(deadline.getFullYear(), deadline.getMonth(), deadline.getDate()).getTime();
        const diff = Math.round((deadlineDate - nowDate) / oneDay);

        if (diff > 0) return "D-" + diff;
        if (diff === 0) return "D-Day";
        return "D+" + Math.abs(diff);
    }

    function formatDuration(ms) {
        const totalSeconds = Math.floor(Math.abs(ms) / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        const hh = String(hours).padStart(2, "0");
        const mm = String(minutes).padStart(2, "0");
        const ss = String(seconds).padStart(2, "0");

        if (days > 0) {
            return days + "일 " + hh + ":" + mm + ":" + ss;
        }
        return hh + ":" + mm + ":" + ss;
    }

    function renderTasks() {
        if (!taskList) return;
        if (!taskItems.length) {
            taskList.innerHTML = '<div class="c-task-empty">등록된 할 일이 없습니다.</div>';
            return;
        }

        const rows = taskItems.map(task => {
            const pending = task.status === "PENDING";
            const done = task.status === "DONE";
            const confirmed = task.status === "CONFIRMED";
            const collapsed = !!taskDetailCollapsed[task.id];
            const toggleText = collapsed ? '펼치기' : '접기';
            const isAssignee = currentUsername && currentUsername === task.assigneeUsername;
            const isCreator = currentUsername && currentUsername === task.createdByUsername;
            const description = task.description ? '<div class="small text-muted mt-1">' + escapeHtml(task.description) + '</div>' : '';
            let statusText = '진행중';
            if (done) {
                statusText = '담당자 완료';
            } else if (confirmed) {
                statusText = '최종 확인 완료';
            }
            let statusBadgeClass = 'c-task-status--pending';
            if (done) {
                statusBadgeClass = 'c-task-status--done';
            } else if (confirmed) {
                statusBadgeClass = 'c-task-status--confirmed';
            }
            const countdownHtml = pending
                ? '<div class="c-task-countdown"><div class="small fw-semibold task-dday">-</div><div class="small text-muted task-remaining">-</div></div>'
                : '';
            let actionHtml = '<span class="badge text-bg-secondary">진행중</span>';
            if (pending && isAssignee) {
                actionHtml = '<button class="btn btn-sm btn-outline-success complete-task-btn c-task-action-btn" data-task-id="' + escapeHtml(task.id) + '">완료</button>';
            } else if (done && isCreator) {
                actionHtml = '<button class="btn btn-sm btn-outline-primary confirm-task-btn c-task-action-btn" data-task-id="' + escapeHtml(task.id) + '">확인</button>';
            } else if (done) {
                actionHtml = '<span class="badge text-bg-warning">확인 대기</span>';
            } else if (confirmed) {
                actionHtml = '<span class="badge text-bg-success">확인 완료</span>';
            }

            return ''
                + '<div class="c-task-item" data-task-id="' + escapeHtml(task.id) + '" data-deadline="' + escapeHtml(task.deadlineAt) + '" data-status="' + escapeHtml(task.status) + '">'
                +   '<div class="d-flex justify-content-between align-items-start gap-2">'
                +     '<div class="c-task-title">' + escapeHtml(task.title) + '</div>'
                +     '<button type="button" class="btn btn-sm c-btn c-btn-outline task-detail-toggle-btn c-task-toggle-btn" data-task-id="' + escapeHtml(task.id) + '">' + toggleText + '</button>'
                +   '</div>'
                +   '<div class="task-detail ' + (collapsed ? 'd-none' : '') + ' mt-2">' +
                '<div class="c-task-kv"><span class="c-task-k">담당</span><span class="c-task-v">' + escapeHtml(task.assigneeName) + ' (@' + escapeHtml(task.assigneeUsername) + ')</span></div>' +
                '<div class="c-task-kv"><span class="c-task-k">마감</span><span class="c-task-v">' + escapeHtml(formatDateTime(task.deadlineAt)) + '</span></div>' +
                '<div class="c-task-kv"><span class="c-task-k">상태</span><span class="c-task-v"><span class="c-task-status ' + statusBadgeClass + '">' + statusText + '</span></span></div>' +
                description +
                '<div class="text-end c-task-meta mt-2">' +
                countdownHtml +
                '<div class="mt-2">' + actionHtml + '</div>' +
                '</div>' +
                '</div>' +
                '</div>';
        });

        taskList.innerHTML = rows.join('');

        taskList.querySelectorAll('.complete-task-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                completeTask(btn.getAttribute('data-task-id'));
            });
        });
        taskList.querySelectorAll('.task-detail-toggle-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                const taskId = btn.getAttribute('data-task-id');
                if (!taskId) return;
                taskDetailCollapsed[taskId] = !taskDetailCollapsed[taskId];
                renderTasks();
            });
        });
        taskList.querySelectorAll('.confirm-task-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                confirmTask(btn.getAttribute('data-task-id'));
            });
        });

        updateTaskCountdowns();
    }

    function updateTaskCountdowns() {
        if (!taskList) return;
        const now = new Date(Date.now() + serverOffsetMs);

        taskList.querySelectorAll('[data-task-id]').forEach(card => {
            const status = card.getAttribute('data-status');
            const ddayNode = card.querySelector('.task-dday');
            const remainNode = card.querySelector('.task-remaining');
            if (!ddayNode || !remainNode) {
                return;
            }

            if (status !== 'PENDING') {
                ddayNode.textContent = '-';
                remainNode.textContent = '-';
                return;
            }

            const deadlineValue = card.getAttribute('data-deadline');
            const deadline = new Date(deadlineValue);
            if (Number.isNaN(deadline.getTime())) {
                ddayNode.textContent = '-';
                remainNode.textContent = '마감일 형식 오류';
                return;
            }

            const diffMs = deadline.getTime() - now.getTime();
            ddayNode.textContent = calcDday(deadline, now);
            remainNode.textContent = diffMs >= 0
                ? '남은 시간 ' + formatDuration(diffMs)
                : '마감 초과 ' + formatDuration(diffMs);
        });
    }

    function stopTaskTimers() {
        if (countdownTimer) {
            clearInterval(countdownTimer);
            countdownTimer = null;
        }
        if (taskRefreshTimer) {
            clearInterval(taskRefreshTimer);
            taskRefreshTimer = null;
        }
        if (readStatusTimer) {
            clearInterval(readStatusTimer);
            readStatusTimer = null;
        }
    }

    function startTaskTimers() {
        stopTaskTimers();
        countdownTimer = setInterval(updateTaskCountdowns, 1000);
        taskRefreshTimer = setInterval(refreshTasks, 30000);
        readStatusTimer = setInterval(refreshReadStatus, 3000);
    }

    function refreshTasks() {
        if (!taskList) return;
        if (!isDirectRoom()) {
            taskItems = [];
            taskDetailCollapsed = {};
            taskList.innerHTML = '';
            hideTaskError();
            stopTaskTimers();
            return;
        }

        fetch('/api/chat/rooms/' + encodeURIComponent(roomId) + '/tasks')
            .then(res => {
                if (!res.ok) {
                    throw new Error('할 일 목록을 불러오지 못했습니다.');
                }
                return res.json();
            })
            .then(data => {
                serverOffsetMs = new Date(data.serverNow).getTime() - Date.now();
                currentUsername = data.currentUsername || "";
                taskItems = Array.isArray(data.tasks) ? data.tasks : [];
                renderTasks();
                startTaskTimers();
                hideTaskError();
            })
            .catch(err => {
                showTaskError(err.message);
            });
    }

    function createTask(event) {
        event.preventDefault();
        hideTaskError();

        const title = taskTitleInput.value.trim();
        const deadline = taskDeadlineInput.value;
        const assigneeUsername = (taskAssigneeInput.value || '').trim();

        if (!title || !deadline || !assigneeUsername) {
            showTaskError('할 일, 마감일시, 담당자를 모두 입력해 주세요.');
            return;
        }

        fetch('/api/chat/rooms/' + encodeURIComponent(roomId) + '/tasks', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: title,
                deadlineAt: deadline,
                assigneeUsername: assigneeUsername
            })
        })
            .then(res => {
                if (!res.ok) {
                    throw new Error('할 일 지정에 실패했습니다.');
                }
                return res.json();
            })
            .then(() => {
                taskTitleInput.value = '';
                const nextHour = new Date(Date.now() + (60 * 60 * 1000));
                taskDeadlineInput.value = normalizeDateTimeLocal(nextHour);
                refreshTasks();
            })
            .catch(err => {
                showTaskError(err.message);
            });
    }

    function completeTask(taskId) {
        hideTaskError();
        const ok = window.confirm('이 할 일을 완료 처리하시겠습니까?');
        if (!ok) {
            return;
        }

        fetch('/api/chat/rooms/' + encodeURIComponent(roomId) + '/tasks/' + encodeURIComponent(taskId) + '/complete', {
            method: 'POST'
        })
            .then(res => {
                if (!res.ok) {
                    throw new Error('완료 처리에 실패했습니다.');
                }
                alert('완료 처리되었습니다. 할 일을 지정한 사람이 확인 버튼으로 최종 확인할 수 있습니다.');
                refreshTasks();
            })
            .catch(err => {
                showTaskError(err.message);
            });
    }

    function confirmTask(taskId) {
        hideTaskError();
        const ok = window.confirm('상대가 완료한 과제를 확인 처리하시겠습니까?');
        if (!ok) {
            return;
        }

        fetch('/api/chat/rooms/' + encodeURIComponent(roomId) + '/tasks/' + encodeURIComponent(taskId) + '/confirm', {
            method: 'POST'
        })
            .then(res => {
                if (!res.ok) {
                    throw new Error('확인 처리에 실패했습니다.');
                }
                alert('과제 확인이 완료되었습니다.');
                refreshTasks();
            })
            .catch(err => {
                showTaskError(err.message);
            });
    }

    roomSelect.addEventListener("change", function () {
        if (!roomSelect.value) return;
        moveRoom(roomSelect.value);
    });

    joinRoomBtn.addEventListener("click", function () {
        if (!roomSelect.value) return;
        moveRoom(roomSelect.value);
    });

    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendMessage();
    });

    if (taskForm) {
        taskForm.addEventListener('submit', createTask);
    }

    window.addEventListener("focus", function () {
        markAsRead();
        refreshUnreadCount();
        refreshTasks();
        refreshReadStatus();
    });

    Promise.allSettled([resolvePartnerIfNeeded(), loadMyIdentity()]).finally(function () {
        loadAccessibleRooms().finally(function () {
            applyRoomLabel();
            loadHistory();
            connectSocket();
            markAsRead();
            refreshUnreadCount();
            refreshTasks();
        });
    });
</script>
</body>
</html>
